artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a small JSON summary report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["text_or_log_file", "generated_output_artifact"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "Parse a small, fixed-format access log (6 lines) and emit three summary fields; no edge cases beyond basic counting and a single most-common lookup."
solution_explanation = "Read /app/access.log line by line, track a running total, a set of client IPs, and a Counter of request paths, then write total_requests, unique_ips, and the single most-common path to /app/report.json."
verification_explanation = "The verifier independently checks the fixed log's three expected values and asserts /app/report.json is a JSON object containing the required typed fields, with one pytest test per success criterion in instruction.md."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = false
mcp_servers = []
